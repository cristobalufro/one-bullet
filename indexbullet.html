<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ONE BULLET</title>
    <style>
        body {
            background-color: #050505; margin: 0; overflow: hidden;
            font-family: 'Courier New', Courier, monospace; color: #fff;
            display: flex; align-items: center; justify-content: center; height: 100vh;
        }
        canvas {
            display: block; width: 100vw; height: 100vh;
            object-fit: contain; cursor: crosshair; background-color: #0a0a0c;
        }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 10; width: 100%; }
        .text-neon { font-size: 24px; font-weight: bold; text-transform: uppercase; text-shadow: 0 0 10px rgba(255,255,255,0.5); margin-bottom: 5px; }
        
        /* New HUD Styles */
        #hud-container { display: flex; gap: 40px; margin-top: 10px; }
        .hud-item { font-size: 20px; font-weight: bold; color: #fff; text-shadow: 0 0 5px #fff; }
        .hud-value { color: #0ff; text-shadow: 0 0 8px #0ff; }
        .timer-warning { color: #f00 !important; text-shadow: 0 0 10px #f00 !important; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="game-title" class="text-neon">ONE BULLET</div>
        <div id="bullet-status" class="text-neon" style="color:#0ff; text-shadow:0 0 10px #0ff;"></div>
        
        <div id="hud-container">
            <div class="hud-item"><span id="lbl-score">SCORE:</span> <span id="val-score" class="hud-value">0</span></div>
            <div class="hud-item"><span id="lbl-wave">WAVE:</span> <span id="val-wave" class="hud-value">1</span></div>
            <div class="hud-item"><span id="lbl-timer">TIME:</span> <span id="val-timer" class="hud-value">25.0</span></div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    // --- 1. TRANSLATION SYSTEM (i18n) ---
    const LANG = {
        en: {
            title: "ONE BULLET",
            status_ready: "STATUS: READY",
            status_danger: "STATUS: DANGER (BOUNCING)",
            status_recover: "STATUS: STOPPED (RECOVER)",
            death_self: "YOU SHOT YOURSELF",
            death_melee: "FATAL CONTACT",
            death_shot: "YOU GOT SHOT",
            death_ghost: "YOUR TIME RAN OUT",
            restart: " - CLICK TO RESTART",
            score: "SCORE:",
            wave: "WAVE:",
            timer: "TIME:",
            ghost_warning: "HURRY UP! ANOMALY SPAWNED!",
            trickshot_1: " RICOCHET!",
            trickshot_2: " TRICKSHOT!",
            trickshot_3: " GEOMETRY GOD!"
        },
        es: {
            title: "ONE BULLET",
            status_ready: "ESTADO: LISTA",
            status_danger: "ESTADO: PELIGRO (REBOTANDO)",
            status_recover: "ESTADO: DETENIDA (RECUPERAR)",
            death_self: "TE MATASTE CON TU PROPIA BALA",
            death_melee: "CONTACTO FATAL",
            death_shot: "RECIBISTE UN DISPARO",
            death_ghost: "SE TE ACABÓ EL TIEMPO",
            restart: " - CLICK PARA REINICIAR",
            score: "PUNTAJE:",
            wave: "OLEADA:",
            timer: "TIEMPO:",
            ghost_warning: "¡DATE PRISA! ¡ANOMALÍA DETECTADA!",
            trickshot_1: " ¡REBOTE!",
            trickshot_2: " ¡TIRO CON EFECTO!",
            trickshot_3: " ¡DIOS DE LA GEOMETRÍA!"
        }
    };

    let currentLang = 'en'; // Change to 'es' when needed
    function t(key) { return LANG[currentLang][key]; }

    // Initialize UI Text
    document.getElementById('game-title').innerText = t('title');
    document.getElementById('lbl-score').innerText = t('score');
    document.getElementById('lbl-wave').innerText = t('wave');
    document.getElementById('lbl-timer').innerText = t('timer');
    const statusText = document.getElementById('bullet-status');
    statusText.innerText = t('status_ready');

    // --- CORE GAME SETUP ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- AUDIO SYSTEM (Retro Web Audio) ---
    const AudioEngine = {
        ctx: null,
        init() {
            if (this.ctx) return;
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        },
        play(type) {
            this.init();
            if (this.ctx.state === 'suspended') this.ctx.resume();
            
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            
            const now = this.ctx.currentTime;
            
            switch(type) {
                case 'shoot':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.1);
                    osc.start(); osc.stop(now + 0.1);
                    break;
                case 'bounce':
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(600, now + 0.05);
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.05);
                    osc.start(); osc.stop(now + 0.05);
                    break;
                case 'kill':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.linearRampToValueAtTime(50, now + 0.2);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.2);
                    osc.start(); osc.stop(now + 0.2);
                    break;
                case 'pickup':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, now);
                    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.1);
                    osc.start(); osc.stop(now + 0.1);
                    break;
                case 'death':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.linearRampToValueAtTime(20, now + 0.5);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.5);
                    osc.start(); osc.stop(now + 0.5);
                    break;
                case 'wave':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(440, now);
                    osc.frequency.exponentialRampToValueAtTime(880, now + 0.2);
                    osc.frequency.exponentialRampToValueAtTime(440, now + 0.4);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.4);
                    osc.start(); osc.stop(now + 0.4);
                    break;
            }
        }
    };

    const GAME_WIDTH = 1280; const GAME_HEIGHT = 720;
    canvas.width = GAME_WIDTH; canvas.height = GAME_HEIGHT;
    const WORLD_WIDTH = 2500; const WORLD_HEIGHT = 1500;

    const COLORS = {
        bg: '#0a0a0c', wall: '#222', wallNeon: '#444',
        player: '#00ffff', enemyMelee: '#ff0055', enemyShooter: '#ff8800',
        enemyShotgun: '#bf00ff', enemyBurst: '#ffff00',
        telegraph: '#ffffff', enemyBullet: '#ff5500', ghost: '#ff0000',
        bulletActive: '#ffff00', bulletIdle: '#555555',
        blood: '#ff0055', spark: '#ffff00', grid: '#111'
    };

    const keys = { w: false, a: false, s: false, d: false };
    const mouse = { screenX: GAME_WIDTH/2, screenY: GAME_HEIGHT/2, worldX: 0, worldY: 0 };
    let camX = 0, camY = 0;

    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
    window.addEventListener('mousemove', e => { 
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width; const scaleY = canvas.height / rect.height;
        mouse.screenX = (e.clientX - rect.left) * scaleX; mouse.screenY = (e.clientY - rect.top) * scaleY;
    });
    window.addEventListener('mousedown', e => { if(e.button === 0) tryShoot(); });

    let lastTime = 0, shakeTime = 0, shakeIntensity = 0, hitStopFrames = 0, gameOver = false;
    let particles = [], enemies = [], enemyBullets = [], floatingTexts = [];

    // --- SYSTEM: WAVES & SCORING ---
    let wave = 1;
    let score = 0;
    let waveTimer = 25.0;
    let isTransitioning = false;
    let transitionTimer = 0;
    let currentLayoutName = "The Pinball";
    let ghostActive = false;
    let ghost = null;

    // --- SYSTEM: ARENA SHIFTING ---
    const BORDER_WALLS = [
        {x: 0, y: 0, w: WORLD_WIDTH, h: 20}, {x: 0, y: WORLD_HEIGHT-20, w: WORLD_WIDTH, h: 20},
        {x: 0, y: 0, w: 20, h: WORLD_HEIGHT}, {x: WORLD_WIDTH-20, y: 0, w: 20, h: WORLD_HEIGHT}
    ];

    const LAYOUTS = [
        {
            name: "The Pinball",
            walls: [{x: 400, y: 300, w: 60, h: 60}, {x: 800, y: 300, w: 60, h: 60}, {x: 1200, y: 300, w: 60, h: 60}, {x: 1600, y: 300, w: 60, h: 60}, {x: 2000, y: 300, w: 60, h: 60}, {x: 600, y: 600, w: 60, h: 60}, {x: 1000, y: 600, w: 60, h: 60}, {x: 1400, y: 600, w: 60, h: 60}, {x: 1800, y: 600, w: 60, h: 60}, {x: 400, y: 900, w: 60, h: 60}, {x: 800, y: 900, w: 60, h: 60}, {x: 1200, y: 900, w: 60, h: 60}, {x: 1600, y: 900, w: 60, h: 60}, {x: 2000, y: 900, w: 60, h: 60}, {x: 600, y: 1200, w: 60, h: 60}, {x: 1000, y: 1200, w: 60, h: 60}, {x: 1400, y: 1200, w: 60, h: 60}, {x: 1800, y: 1200, w: 60, h: 60}, {x: 100, y: 700, w: 40, h: 100}, {x: 2360, y: 700, w: 40, h: 100}]
        },
        {
            name: "The Zig-Zag",
            walls: [{x: 0, y: 400, w: 440, h: 340}, {x: 400, y: 700, w: 440, h: 340}, {x: 2060, y: 760, w: 440, h: 340}, {x: 1700, y: 460, w: 440, h: 340}, {x: 1100, y: 300, w: 300, h: 40}, {x: 1100, y: 1160, w: 300, h: 40}, {x: 1230, y: 600, w: 40, h: 300}]
        },
        {
            name: "The Bunkers",
            walls: [
                {x: 300, y: 300, w: 340, h: 340}, // Top Left L (Merged)
                {x: 1860, y: 300, w: 340, h: 340}, // Top Right L (Merged)
                {x: 300, y: 860, w: 340, h: 340}, // Bottom Left L (Merged)
                {x: 1860, y: 860, w: 340, h: 340}, // Bottom Right L (Merged)
                {x: 1100, y: 650, w: 300, h: 200}  // Solid Center Block
            ]
        },
        {
            name: "The Factory",
            walls: [{x: 600, y: 0, w: 40, h: 600}, {x: 600, y: 900, w: 40, h: 600}, {x: 1860, y: 0, w: 40, h: 600}, {x: 1860, y: 900, w: 40, h: 600}, {x: 640, y: 400, w: 500, h: 40}, {x: 1360, y: 400, w: 500, h: 40}, {x: 640, y: 1060, w: 500, h: 40}, {x: 1360, y: 1060, w: 500, h: 40}, {x: 1150, y: 650, w: 200, h: 200}]
        },
        {
            name: "The Crossfire",
            walls: [{x: 1230, y: 100, w: 40, h: 500}, {x: 1230, y: 900, w: 40, h: 500}, {x: 200, y: 730, w: 900, h: 40}, {x: 1400, y: 730, w: 900, h: 40}, {x: 500, y: 250, w: 200, h: 40}, {x: 500, y: 1210, w: 200, h: 40}, {x: 1800, y: 250, w: 200, h: 40}, {x: 1800, y: 1210, w: 200, h: 40}, {x: 1230, y: 700, w: 40, h: 100}]
        },
        {
            name: "The Arena",
            walls: [
                {x: 950, y: 400, w: 600, h: 100}, // Top Bar
                {x: 950, y: 1000, w: 600, h: 100}, // Bottom Bar
                {x: 800, y: 500, w: 100, h: 500}, // Left Bar
                {x: 1600, y: 500, w: 100, h: 500}, // Right Bar
                {x: 200, y: 200, w: 120, h: 120}, // Big Corner Pillars
                {x: 2180, y: 200, w: 120, h: 120},
                {x: 200, y: 1180, w: 120, h: 120},
                {x: 2180, y: 1180, w: 120, h: 120}
            ]
        }
    ];

    let walls = [...BORDER_WALLS, ...LAYOUTS[0].walls];

    // --- ENTITIES ---

    // PLAYER
    const player = {
        x: 200, y: 200, vx: 0, vy: 0, radius: 15, maxSpeed: 600, hasBullet: true,
        update(dt) {
            let dx = 0, dy = 0;
            if (keys.w) dy -= 1; if (keys.s) dy += 1;
            if (keys.a) dx -= 1; if (keys.d) dx += 1;
            if (dx !== 0 && dy !== 0) { let length = Math.sqrt(dx*dx + dy*dy); dx /= length; dy /= length; }

            this.vx += (dx * this.maxSpeed - this.vx) * 25 * dt;
            this.vy += (dy * this.maxSpeed - this.vy) * 25 * dt;

            const epsilon = 0.1;
            this.x += this.vx * dt;
            for(let w of walls) {
                if(rectCircleColliding(this, w)) {
                    if (this.vx > 0) this.x = w.x - this.radius - epsilon;
                    else if (this.vx < 0) this.x = w.x + w.w + this.radius + epsilon;
                    this.vx = 0;
                    break;
                }
            }
            this.y += this.vy * dt;
            for(let w of walls) {
                if(rectCircleColliding(this, w)) {
                    if (this.vy > 0) this.y = w.y - this.radius - epsilon;
                    else if (this.vy < 0) this.y = w.y + w.h + this.radius + epsilon;
                    this.vy = 0;
                    break;
                }
            }
            
            this.x = Math.max(this.radius, Math.min(WORLD_WIDTH - this.radius, this.x));
            this.y = Math.max(this.radius, Math.min(WORLD_HEIGHT - this.radius, this.y));
        },
        draw() {
            ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(Math.atan2(mouse.worldY - this.y, mouse.worldX - this.x));
            ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI*2);
            ctx.fillStyle = COLORS.bg; ctx.fill(); ctx.lineWidth = 3; ctx.strokeStyle = COLORS.player; ctx.stroke();
            ctx.fillStyle = COLORS.player; ctx.fillRect(this.radius - 2, -4, 18, 8);
            if(this.hasBullet) { ctx.fillStyle = COLORS.bulletActive; ctx.beginPath(); ctx.arc(this.radius + 12, 0, 4, 0, Math.PI*2); ctx.fill(); }
            ctx.restore();

            // Bullet Pointer (Compass)
            if (!this.hasBullet) {
                const angleToBullet = Math.atan2(bullet.y - this.y, bullet.x - this.x);
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(angleToBullet);
                
                const arrowDist = this.radius + 25;
                ctx.beginPath();
                ctx.moveTo(arrowDist, 0);
                ctx.lineTo(arrowDist - 12, -8);
                ctx.lineTo(arrowDist - 12, 8);
                ctx.closePath();
                
                ctx.fillStyle = bullet.moving ? COLORS.bulletActive : COLORS.bulletIdle;
                ctx.fill();
                
                // Optional glow for the arrow
                ctx.shadowBlur = 10;
                ctx.shadowColor = ctx.fillStyle;
                ctx.fill();
                
                ctx.restore();
            }
        }
    };

    // PLAYER BULLET (With Trickshot Scoring)
    const bullet = {
        x: 0, y: 0, vx: 0, vy: 0, radius: 6, speed: 1800, active: false, moving: false,
        bounces: 0, maxBounces: 3, trail: [], graceTimer: 0, comboChain: 0,

        fire(sx, sy, tx, ty) {
            this.x = sx; this.y = sy; let angle = Math.atan2(ty - sy, tx - sx);
            this.vx = Math.cos(angle) * this.speed; this.vy = Math.sin(angle) * this.speed;
            this.active = true; this.moving = true; this.bounces = 0; this.comboChain = 0;
            this.trail = []; this.graceTimer = 0.15; player.hasBullet = false;
            updateUI(); addScreenShake(12, 0.1);
            AudioEngine.play('shoot');
        },
        stop() { this.vx = 0; this.vy = 0; this.moving = false; updateUI(); },
        update(dt) {
            if (!this.active) return;
            if (this.graceTimer > 0) this.graceTimer -= dt;

            this.trail.push({x: this.x, y: this.y, alpha: 1});
            if (this.trail.length > 15) this.trail.shift();
            for(let t of this.trail) t.alpha -= dt * 6;

            if (!this.moving) {
                if (Math.hypot(player.x - this.x, player.y - this.y) < player.radius + this.radius + 15) {
                    this.active = false; player.hasBullet = true; updateUI();
                    AudioEngine.play('pickup');
                    for(let i=0; i<5; i++) spawnParticle(this.x, this.y, COLORS.bulletActive, 250);
                } return;
            }

            let steps = 4; let stepDt = dt / steps;
            for(let s = 0; s < steps; s++) {
                let nextX = this.x + this.vx * stepDt; let nextY = this.y + this.vy * stepDt; let bounced = false;

                for(let w of walls) { if(rectCircleColliding({x: nextX, y: this.y, radius: this.radius}, w)) { this.vx *= -1; bounced = true; nextX = this.x; spawnParticle(this.x, this.y, COLORS.spark, 400, 6); break; } }
                this.x = nextX;
                for(let w of walls) { if(rectCircleColliding({x: this.x, y: nextY, radius: this.radius}, w)) { this.vy *= -1; bounced = true; nextY = this.y; spawnParticle(this.x, this.y, COLORS.spark, 400, 6); break; } }
                this.y = nextY;

                if (bounced) {
                    this.bounces++;
                    addScreenShake(8, 0.08);
                    AudioEngine.play('bounce');
                    if (this.bounces >= this.maxBounces) { this.stop(); break; }
                }

                for(let i = enemies.length - 1; i >= 0; i--) {
                    let e = enemies[i];
                    if (Math.hypot(e.x - this.x, e.y - this.y) < e.radius + this.radius) {
                        
                        // Trickshot Scoring System
                        let pts = 100;
                        let textParams = { text: "+100", color: '#fff', size: 20 };
                        
                        if (this.bounces === 1) { pts = 300; textParams = { text: "+300" + t('trickshot_1'), color: '#ffea00', size: 26 }; }
                        else if (this.bounces === 2) { pts = 600; textParams = { text: "+600" + t('trickshot_2'), color: '#ff9100', size: 32 }; }
                        else if (this.bounces >= 3) { pts = 1000; textParams = { text: "+1000" + t('trickshot_3'), color: '#ff00aa', size: 40 }; }
                        
                        this.comboChain++;
                        let finalPts = pts * this.comboChain;
                        score += finalPts;

                        let comboText = this.comboChain > 1 ? ` x${this.comboChain} COMBO!` : "";
                        if (this.comboChain >= 3) comboText = ` x${this.comboChain} RAMPAGE!`;
                        
                        addFloatingText(textParams.text + comboText, e.x, e.y, textParams.color, 1.5, textParams.size + (this.comboChain * 10));

                        spawnParticle(e.x, e.y, COLORS.blood, 600, 25 * Math.pow(2, this.comboChain - 1));
                        enemies.splice(i, 1);
                        
                        addScreenShake(25 + (this.comboChain * 10), 0.2);
                        hitStopFrames = 4 + (this.comboChain * 2);
                        
                        AudioEngine.play('kill');

                        // Overdrive Logic: Pierce if bounced
                        if (this.bounces === 0) {
                            this.stop(); this.x = e.x; this.y = e.y; break;
                        }
                    }
                }

                if (this.graceTimer <= 0 && this.moving && Math.hypot(player.x - this.x, player.y - this.y) < player.radius + this.radius) {
                    triggerGameOver(t('death_self'));
                }
            }
        },
        draw() {
            if (!this.active) return;
            ctx.beginPath();
            for(let i=0; i<this.trail.length; i++) {
                if(i===0) ctx.moveTo(this.trail[i].x, this.trail[i].y); else ctx.lineTo(this.trail[i].x, this.trail[i].y);
            }
            ctx.strokeStyle = this.moving ? COLORS.bulletActive : COLORS.bulletIdle;
            ctx.lineWidth = this.radius * 2; ctx.lineCap = "round"; ctx.globalAlpha = 0.5; ctx.stroke(); ctx.globalAlpha = 1.0;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.fillStyle = this.moving ? COLORS.bulletActive : COLORS.bulletIdle; ctx.fill();
        }
    };

    // ENEMY BULLET
    class EnemyBullet {
        constructor(x, y, angle) {
            this.x = x; this.y = y; this.radius = 4; this.speed = 600;
            this.vx = Math.cos(angle) * this.speed; this.vy = Math.sin(angle) * this.speed;
            this.active = true;
        }
        update(dt) {
            this.x += this.vx * dt; this.y += this.vy * dt;
            for(let w of walls) { if(rectCircleColliding(this, w)) { this.active = false; spawnParticle(this.x, this.y, COLORS.enemyBullet, 150, 3); return; } }
            if (Math.hypot(player.x - this.x, player.y - this.y) < player.radius + this.radius) {
                triggerGameOver(t('death_shot')); this.active = false;
            }
        }
        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.fillStyle = COLORS.enemyBullet; ctx.fill();
            ctx.shadowBlur = 10; ctx.shadowColor = COLORS.enemyBullet; ctx.fill(); ctx.shadowBlur = 0;
        }
    }

    // THE SPELUNKY GHOST (Anti-Camping System)
    class Ghost {
        constructor(x, y) {
            this.x = x; this.y = y; this.radius = 20; 
            this.speed = player.maxSpeed * 0.4; // Slightly slower than player max speed, but never stops
        }
        update(dt) {
            let angle = Math.atan2(player.y - this.y, player.x - this.x);
            this.x += Math.cos(angle) * this.speed * dt;
            this.y += Math.sin(angle) * this.speed * dt;
            // The Ghost ignores walls completely.
            if(Math.hypot(player.x - this.x, player.y - this.y) < player.radius + this.radius) {
                triggerGameOver(t('death_ghost'));
            }
        }
        draw() {
            ctx.save(); ctx.translate(this.x, this.y);
            ctx.globalAlpha = 0.8;
            ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI*2);
            ctx.fillStyle = COLORS.ghost; ctx.fill();
            ctx.shadowBlur = 30; ctx.shadowColor = COLORS.ghost; ctx.fill();
            
            // Creepy ghost eyes
            ctx.fillStyle = '#000';
            ctx.rotate(Math.atan2(player.y - this.y, player.x - this.x));
            ctx.fillRect(this.radius - 8, -10, 6, 6);
            ctx.fillRect(this.radius - 8, 4, 6, 6);
            ctx.restore();
        }
    }

    // ENEMY AI (Your Exact Corner-Pathing implementation - Untouched)
    class Enemy {
        constructor(x, y, type = 'melee') {
            this.x = x; this.y = y; this.radius = 16; this.type = type;
            this.state = 'chase';
            this.timer = 0;
            this.targetCorner = null;
            this.burstCount = 0;
            this.burstTimer = 0;

            if (type === 'melee') this.speed = 250 + Math.random() * 50;
            else if (type === 'shooter') this.speed = 150 + Math.random() * 30;
            else if (type === 'shotgun') this.speed = 0;
            else if (type === 'burst') this.speed = 200 + Math.random() * 40;
        }
        update(dt) {
            let distToPlayer = Math.hypot(player.x - this.x, player.y - this.y);

            // 1. Line of Sight Check (once per frame)
            let hasLOS = true;
            for(let w of walls) { if(lineRectIntersect(this.x, this.y, player.x, player.y, w)) { hasLOS = false; break; } }

            // 2. Combat Logic (Behavior State Machine)
            if (this.type !== 'melee') {
                if (this.state === 'chase') {
                    let canAim = hasLOS && distToPlayer < 700;
                    if (this.type === 'shooter' || this.type === 'burst') canAim = canAim && distToPlayer > 150;
                    
                    if (canAim && Math.random() < 0.05) {
                        this.state = 'aiming';
                        this.timer = this.type === 'shotgun' ? 0.35 : 0.6;
                    }
                } else if (this.state === 'aiming') {
                    this.timer -= dt;
                    if (this.timer <= 0) {
                        if (hasLOS) {
                            let angle = Math.atan2(player.y - this.y, player.x - this.x);
                            
                            if (this.type === 'shooter') {
                                enemyBullets.push(new EnemyBullet(this.x, this.y, angle));
                                this.state = 'cooldown'; this.timer = 1.2;
                                addScreenShake(5, 0.05);
                            } else if (this.type === 'shotgun') {
                                for(let offset of [-0.2, -0.1, 0, 0.1, 0.2]) {
                                    enemyBullets.push(new EnemyBullet(this.x, this.y, angle + offset));
                                }
                                this.state = 'cooldown'; this.timer = 2.5;
                                addScreenShake(12, 0.1);
                            } else if (this.type === 'burst') {
                                this.state = 'firing_burst';
                                this.burstCount = 3;
                                this.burstTimer = 0;
                            }
                        } else {
                            this.state = 'chase';
                        }
                    }
                } else if (this.state === 'firing_burst') {
                    this.burstTimer -= dt;
                    if (this.burstTimer <= 0) {
                        let angle = Math.atan2(player.y - this.y, player.x - this.x);
                        enemyBullets.push(new EnemyBullet(this.x, this.y, angle));
                        addScreenShake(3, 0.03);
                        this.burstCount--;
                        this.burstTimer = 0.15;
                        if (this.burstCount <= 0) {
                            this.state = 'cooldown'; this.timer = 1.5;
                        }
                    }
                } else if (this.state === 'cooldown') {
                    this.timer -= dt; if (this.timer <= 0) this.state = 'chase';
                }
            }

            // 3. Pathfinding Logic (Corner Navigation)
            if (hasLOS) {
                this.targetCorner = null;
            } else {
                let targetStillVisible = true;
                if (this.targetCorner) {
                    for(let w of walls) { if(lineRectIntersect(this.x, this.y, this.targetCorner.x, this.targetCorner.y, w)) { targetStillVisible = false; break; } }
                }

                if (!this.targetCorner || distSq(this.x, this.y, this.targetCorner.x, this.targetCorner.y) < 100 || !targetStillVisible) {
                    let bestCorner = null;
                    let minDist = Infinity;
                    const padding = 25;

                    for(let w of walls) {
                        let corners = [
                            {x: w.x - padding, y: w.y - padding},
                            {x: w.x + w.w + padding, y: w.y - padding},
                            {x: w.x - padding, y: w.y + w.h + padding},
                            {x: w.x + w.w + padding, y: w.y + w.h + padding}
                        ];

                        for(let c of corners) {
                            // Skip if the corner point itself is inside ANY wall
                            let insideWall = false;
                            for(let wInside of walls) {
                                if(pointInRect(c.x, c.y, wInside)) { insideWall = true; break; }
                            }
                            if (insideWall) continue;

                            let cornerVisible = true;
                            for(let w2 of walls) { if(lineRectIntersect(this.x, this.y, c.x, c.y, w2)) { cornerVisible = false; break; } }
                            
                            if (cornerVisible) {
                                let d = distSq(this.x, this.y, c.x, c.y) + distSq(c.x, c.y, player.x, player.y);
                                if (d < minDist) { minDist = d; bestCorner = c; }
                            }
                        }
                    }
                    this.targetCorner = bestCorner;
                }
            }

            // Movement Logic
            let targetX = this.targetCorner ? this.targetCorner.x : player.x;
            let targetY = this.targetCorner ? this.targetCorner.y : player.y;
            
            let moveX = 0; let moveY = 0;

            if (this.state !== 'aiming' && this.state !== 'firing_burst' && (this.type === 'melee' || this.state !== 'cooldown')) {
                let angle = Math.atan2(targetY - this.y, targetX - this.x);
                moveX = Math.cos(angle) * this.speed * dt;
                moveY = Math.sin(angle) * this.speed * dt;
            }

            // Enemy-Enemy Separation
            for(let other of enemies) {
                if(other === this) continue;
                let dSq = distSq(this.x, this.y, other.x, other.y);
                let minDist = (this.radius + other.radius);
                if(dSq < minDist * minDist) {
                    let d = Math.sqrt(dSq) || 1;
                    let pushForce = (minDist - d) * 10 * dt;
                    let angle = Math.atan2(this.y - other.y, this.x - other.x);
                    moveX += Math.cos(angle) * pushForce;
                    moveY += Math.sin(angle) * pushForce;
                }
            }

            const epsilon = 0.1;
            this.x += moveX;
            for(let w of walls) {
                if(rectCircleColliding(this, w)) {
                    if (moveX > 0) this.x = w.x - this.radius - epsilon;
                    else if (moveX < 0) this.x = w.x + w.w + this.radius + epsilon;
                    break;
                }
            }
            this.y += moveY;
            for(let w of walls) {
                if(rectCircleColliding(this, w)) {
                    if (moveY > 0) this.y = w.y - this.radius - epsilon;
                    else if (moveY < 0) this.y = w.y + w.h + this.radius + epsilon;
                    break;
                }
            }

            if(distToPlayer < player.radius + this.radius) triggerGameOver(t('death_melee'));
        }
        draw() {
            ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(Math.atan2(player.y - this.y, player.x - this.x));
            ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI*2);
            ctx.fillStyle = COLORS.bg; ctx.fill(); ctx.lineWidth = 3; 
            
            let mainColor = COLORS.enemyMelee;
            if (this.state === 'aiming' || this.state === 'firing_burst') mainColor = COLORS.telegraph;
            else if (this.type === 'shooter') mainColor = COLORS.enemyShooter;
            else if (this.type === 'shotgun') mainColor = COLORS.enemyShotgun;
            else if (this.type === 'burst') mainColor = COLORS.enemyBurst;

            ctx.strokeStyle = mainColor; ctx.stroke();
            ctx.fillStyle = mainColor; ctx.fillRect(this.radius - 6, -8, 5, 5); ctx.fillRect(this.radius - 6, 3, 5, 5);
            
            if (this.type !== 'melee') {
                if (this.type === 'shooter') ctx.fillRect(this.radius, -2, 12, 4);
                else if (this.type === 'shotgun') ctx.fillRect(this.radius, -5, 8, 10);
                else if (this.type === 'burst') ctx.fillRect(this.radius, -2, 20, 4);

                if (this.state === 'aiming' || this.state === 'firing_burst') {
                    ctx.beginPath(); ctx.moveTo(this.radius + 12, 0); ctx.lineTo(this.radius + 600, 0);
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)'; ctx.lineWidth = 1; ctx.stroke();
                }
            }
            ctx.restore();
        }
    }

    // --- SYSTEMS & UTILITIES ---

    function getSafePosition(radius, avoidPlayer = false) {
        let x, y, valid = false;
        let attempts = 0; // Previene bucles infinitos si el nivel está muy lleno
        
        while(!valid && attempts < 200) {
            attempts++;
            x = Math.random() * (WORLD_WIDTH - 100) + 50;
            y = Math.random() * (WORLD_HEIGHT - 100) + 50;
            valid = true;
            
            // Evitar generar dentro de paredes
            for(let w of walls) {
                if (rectCircleColliding({x: x, y: y, radius: radius + 5}, w)) {
                    valid = false; break;
                }
            }
            
            // Evitar generar muy cerca del jugador (usado para enemigos)
            if (valid && avoidPlayer) {
                if (distSq(x, y, player.x, player.y) < 500 * 500) valid = false;
            }
        }
        
        // Fallback: si falla 200 veces (casi imposible), lo forzamos a una esquina
        if (!valid) return {x: 100, y: 100};
        return {x, y};
    }

    function spawnEnemiesForWave() {
        enemies = [];
        enemyBullets = [];
        
        let meleeCount = 2 + Math.floor(wave / 2);
        let rangedCount = 2 + Math.floor(wave / 3);
        if (wave === 1) { meleeCount = 3; rangedCount = 1; }

        const spawn = (type) => {
            let pos = getSafePosition(20, true);
            enemies.push(new Enemy(pos.x, pos.y, type));
        };

        for(let i=0; i<meleeCount; i++) spawn('melee');
        
        for(let i=0; i<rangedCount; i++) {
            let types = ['shooter'];
            if (wave >= 3) types.push('shotgun');
            if (wave >= 5) types.push('burst');
            
            let randomType = types[Math.floor(Math.random() * types.length)];
            spawn(randomType);
        }
    }

    function startWaveTransition() {
        isTransitioning = true;
        transitionTimer = 1.5; // Segundos que dura la pausa de nivel
        
        wave++;
        waveTimer = 25.0;
        ghostActive = false;
        ghost = null;
        bullet.speed *= 1.02;
        
        // 1. Cambiar mapa
        let randomLayoutIndex = Math.floor(Math.random() * LAYOUTS.length);
        currentLayoutName = LAYOUTS[randomLayoutIndex].name;
        walls = [...BORDER_WALLS, ...LAYOUTS[randomLayoutIndex].walls];

        // 2. Reubicar Jugador de forma segura
        let safePlayerPos = getSafePosition(player.radius);
        player.x = safePlayerPos.x;
        player.y = safePlayerPos.y;
        
        // 3. Forzar recuperación de la bala
        bullet.active = false;
        player.hasBullet = true;

        // 4. Generar enemigos en el nuevo mapa
        spawnEnemiesForWave();
        updateUI();
        AudioEngine.play('wave');
    }

    function addFloatingText(text, x, y, color='#fff', life=1.5, size=20) {
        floatingTexts.push({ text, x, y, color, life, maxLife: life, size });
    }

    function drawFloatingTexts() {
        ctx.textAlign = "center";
        for(let ft of floatingTexts) {
            ctx.globalAlpha = Math.max(0, ft.life / ft.maxLife);
            ctx.fillStyle = ft.color;
            ctx.font = `bold ${ft.size}px 'Courier New'`;
            ctx.fillText(ft.text, ft.x, ft.y);
            // Optional: thin stroke for better readability over bright effects
            ctx.lineWidth = 1; ctx.strokeStyle = '#000'; ctx.strokeText(ft.text, ft.x, ft.y); 
        }
        ctx.globalAlpha = 1.0; ctx.textAlign = "left"; // reset
    }

    function spawnParticle(x, y, color, speed, count) {
        for(let i=0; i<count; i++) {
            let angle = Math.random() * Math.PI * 2; let vel = Math.random() * speed;
            particles.push({ x: x, y: y, vx: Math.cos(angle) * vel, vy: Math.sin(angle) * vel, life: 1.0, color: color, size: Math.random() * 5 + 3 });
        }
    }
    
    function updateParticlesAndText(dt) {
        for(let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i]; p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= 0.85; p.vy *= 0.85; p.life -= dt * 2;
            if(p.life <= 0) particles.splice(i, 1);
        }
        for(let i = floatingTexts.length - 1; i >= 0; i--) {
            let ft = floatingTexts[i];
            ft.y -= 40 * dt; // Float upwards
            ft.life -= dt;
            if(ft.life <= 0) floatingTexts.splice(i, 1);
        }
    }
    
    function drawParticles() {
        for(let p of particles) { ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color; ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size); } 
        ctx.globalAlpha = 1.0;
    }

    function tryShoot() { if(gameOver) return resetGame(); if(player.hasBullet) bullet.fire(player.x, player.y, mouse.worldX, mouse.worldY); }

    function rectCircleColliding(circle, rect) {
        let distX = Math.abs(circle.x - rect.x - rect.w/2); let distY = Math.abs(circle.y - rect.y - rect.h/2);
        if (distX > (rect.w/2 + circle.radius) || distY > (rect.h/2 + circle.radius)) return false;
        if (distX <= (rect.w/2) || distY <= (rect.h/2)) return true;
        let dx = distX - rect.w/2; let dy = distY - rect.h/2; return (dx*dx + dy*dy <= (circle.radius*circle.radius));
    }

    function distSq(x1, y1, x2, y2) { return (x2 - x1) * (x2 - x1) + (y2 - y1) * (y2 - y1); }

    function pointInRect(x, y, rect) {
        return x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h;
    }

    function lineRectIntersect(x1, y1, x2, y2, rect) {
        let left = rect.x; let right = rect.x + rect.w; let top = rect.y; let bottom = rect.y + rect.h;
        let tmin = 0, tmax = 1; let dx = x2 - x1; let dy = y2 - y1;
        if (dx !== 0) {
            let t1 = (left - x1) / dx; let t2 = (right - x1) / dx;
            tmin = Math.max(tmin, Math.min(t1, t2)); tmax = Math.min(tmax, Math.max(t1, t2));
        } else if (x1 < left || x1 > right) return false;
        if (dy !== 0) {
            let t1 = (top - y1) / dy; let t2 = (bottom - y1) / dy;
            tmin = Math.max(tmin, Math.min(t1, t2)); tmax = Math.min(tmax, Math.max(t1, t2));
        } else if (y1 < top || y1 > bottom) return false;
        return tmax >= tmin;
    }

    function addScreenShake(intensity, duration) { shakeIntensity = intensity; shakeTime = duration; }

    function updateUI() {
        document.getElementById('val-score').innerText = score;
        document.getElementById('val-wave').innerText = wave;
        
        let timerEl = document.getElementById('val-timer');
        timerEl.innerText = Math.max(0, waveTimer).toFixed(1) + "s";
        if (waveTimer <= 5.0 || ghostActive) timerEl.classList.add('timer-warning');
        else timerEl.classList.remove('timer-warning');

        if(gameOver) return;
        if(player.hasBullet) { statusText.innerText = t('status_ready'); statusText.style.color = COLORS.bulletActive; statusText.style.textShadow = `0 0 10px ${COLORS.bulletActive}`; }
        else if (bullet.moving) { statusText.innerText = t('status_danger'); statusText.style.color = COLORS.enemyMelee; statusText.style.textShadow = `0 0 10px ${COLORS.enemyMelee}`; }
        else { statusText.innerText = t('status_recover'); statusText.style.color = COLORS.bulletIdle; statusText.style.textShadow = "none"; }
    }

    function triggerGameOver(reason) {
        if (gameOver) return;
        gameOver = true; statusText.innerText = reason + t('restart');
        statusText.style.color = COLORS.enemyMelee; statusText.style.textShadow = `0 0 20px ${COLORS.enemyMelee}`; addScreenShake(20, 0.5);
        AudioEngine.play('death');
    }

    function resetGame() {
        wave = 1; score = 0; waveTimer = 25.0;
        ghostActive = false; ghost = null;
        isTransitioning = false;
        currentLayoutName = LAYOUTS[0].name;
        walls = [...BORDER_WALLS, ...LAYOUTS[0].walls];

        // Reubicar de forma segura
        let safeStart = getSafePosition(player.radius);
        player.x = safeStart.x; player.y = safeStart.y;
        
        player.hasBullet = true; bullet.active = false; bullet.speed = 1800;
        particles = []; floatingTexts = [];
        
        spawnEnemiesForWave();
        gameOver = false; updateUI();
    }

    // BOOT
    spawnEnemiesForWave();
    player.x = WORLD_WIDTH/2; player.y = WORLD_HEIGHT/2; // Start in center

    // --- MAIN LOOP ---
    function loop(timestamp) {
        if (!lastTime) lastTime = timestamp;
        let dt = (timestamp - lastTime) / 1000; lastTime = timestamp; if (dt > 0.1) dt = 0.1; 

        ctx.clearRect(0, 0, canvas.width, canvas.height); 

        camX = Math.max(0, Math.min(player.x - GAME_WIDTH / 2, WORLD_WIDTH - GAME_WIDTH));
        camY = Math.max(0, Math.min(player.y - GAME_HEIGHT / 2, WORLD_HEIGHT - GAME_HEIGHT));
        mouse.worldX = mouse.screenX + camX; mouse.worldY = mouse.screenY + camY;

        if (hitStopFrames > 0) { hitStopFrames--; } 
        else {
            if (!gameOver) { 
                player.update(dt); bullet.update(dt); 
                
                enemies.forEach(e => e.update(dt)); 
                for(let i = enemyBullets.length - 1; i >= 0; i--) {
                    enemyBullets[i].update(dt); if(!enemyBullets[i].active) enemyBullets.splice(i, 1);
                }

                // Wave Logic
                if (enemies.length === 0 && !isTransitioning) {
                    startWaveTransition();
                }

                if (isTransitioning) {
                    transitionTimer -= dt;
                    if (transitionTimer <= 0) {
                        isTransitioning = false; // Fin de la pausa, arranca el juego
                    }
                } else {
                    // Ghost Timer Logic SÓLO avanza si NO estamos en transición
                    if (waveTimer > 0) {
                        waveTimer -= dt;
                        if (waveTimer <= 0 && !ghostActive) {
                            ghostActive = true;
                            ghost = new Ghost(camX + GAME_WIDTH/2, camY - 100);
                            addFloatingText(t('ghost_warning'), player.x, player.y - 50, '#f00', 3.0, 30);
                            addScreenShake(25, 0.6);
                        }
                    }
                    if (ghostActive && ghost) ghost.update(dt);
                }

                // Update HUD Text every frame
                updateUI();
            }
            updateParticlesAndText(dt); if (shakeTime > 0) shakeTime -= dt;
        }

        ctx.save();
        if (shakeTime > 0) { ctx.translate((Math.random() - 0.5) * shakeIntensity, (Math.random() - 0.5) * shakeIntensity); }
        ctx.translate(-camX, -camY);

        ctx.strokeStyle = COLORS.grid; ctx.lineWidth = 1; ctx.beginPath();
        for(let x=0; x<=WORLD_WIDTH; x+=100) { ctx.moveTo(x, 0); ctx.lineTo(x, WORLD_HEIGHT); }
        for(let y=0; y<=WORLD_HEIGHT; y+=100) { ctx.moveTo(0, y); ctx.lineTo(WORLD_WIDTH, y); } ctx.stroke();

        ctx.fillStyle = COLORS.bg; ctx.strokeStyle = COLORS.wallNeon; ctx.lineWidth = 2;
        for(let w of walls) { ctx.fillRect(w.x, w.y, w.w, w.h); ctx.strokeRect(w.x, w.y, w.w, w.h); }

        drawParticles();
        if (!gameOver) player.draw();
        enemyBullets.forEach(eb => eb.draw());
        enemies.forEach(e => e.draw());
        if (ghostActive && ghost) ghost.draw();
        bullet.draw();
        drawFloatingTexts();

        ctx.restore();

        // Capa de UI Superior / Transiciones
        if (isTransitioning) {
            // Fondo oscuro semitransparente
            ctx.fillStyle = 'rgba(10, 10, 12, 0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Texto gigante en el centro de la pantalla
            ctx.fillStyle = '#0ff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = "bold 60px 'Courier New'";
            ctx.fillText(t('wave') + " " + wave, canvas.width / 2, canvas.height / 2 - 40);
            
            ctx.fillStyle = '#aaa';
            ctx.font = "bold 32px 'Courier New'";
            ctx.fillText(currentLayoutName, canvas.width / 2, canvas.height / 2 + 20);

            ctx.fillStyle = '#fff';
            ctx.font = "bold 20px 'Courier New'";
            ctx.fillText("PREPARE YOURSELF", canvas.width / 2, canvas.height / 2 + 70);
            
            // Limpiar alineación
            ctx.textAlign = 'left';
            ctx.textBaseline = 'alphabetic';
        }

        if (gameOver) { ctx.fillStyle = 'rgba(255, 0, 50, 0.15)'; ctx.fillRect(0, 0, canvas.width, canvas.height); }
        requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
</script>
