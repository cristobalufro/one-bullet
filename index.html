<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototipo</title>
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: monospace; overflow: hidden; user-select: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: #111118; cursor: crosshair; }
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; /* Ideal para Pixel Art */ }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; box-sizing: border-box; display: flex; justify-content: space-between; font-size: 1.5rem; text-shadow: 2px 2px 0 #000; pointer-events: none;}
        #combo-display { position: absolute; top: 100px; width: 100%; text-align: center; color: #f39c12; font-size: 4rem; font-weight: bold; opacity: 0; transition: opacity 0.1s, transform 0.1s; pointer-events: none; text-shadow: 0 0 20px #f39c12;}
        #combo-timer-text { font-size: 1.5rem; color: #e74c3c; display: block; margin-top: -10px; animation: blink 0.5s infinite; opacity: 0;}
        #health-bar-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 300px; height: 20px; background: #333; border: 2px solid #fff; border-radius: 10px; overflow: hidden; pointer-events: none;}
        #health-bar { width: 100%; height: 100%; background: #e74c3c; transition: width 0.1s; }
        
        #charge-bar-container { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); width: 300px; height: 12px; background: #333; border: 2px solid #fff; border-radius: 6px; overflow: hidden; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
        #charge-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #f1c40f, #2ecc71); }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .danger { color: #e74c3c !important; text-shadow: 0 0 15px #e74c3c !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div>Nivel Nexo: <span id="nexus-level" style="color: #9b59b6;">1</span></div>
            <div>Cristales: <span id="pocket-score" style="color: #3498db;">0</span></div>
        </div>
        <div id="combo-display">
            Combo x<span id="combo-count">1</span>
            <span id="combo-timer-text">¡MANTÉN EL COMBO!</span>
        </div>
        <div id="charge-bar-container">
            <div id="charge-bar"></div>
        </div>
        <div id="health-bar-container">
            <div id="health-bar"></div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.imageSmoothingEnabled = false;
    }
    window.addEventListener('resize', resize);
    resize();

    // ==========================================
    // CONFIGURACIÓN DE TUS SPRITES
    // Pon los nombres exactos de tus archivos aquí
    // ==========================================
    const SPRITES_CONFIG = {
        player: 'caballero.gif', 
        enemy: 'enemigo.gif',
        nexus: 'mago.png'
    };

    const images = {};
    Object.keys(SPRITES_CONFIG).forEach(key => {
        const img = new Image();
        img.src = SPRITES_CONFIG[key];
        img.isLoaded = false;
        img.onload = () => { img.isLoaded = true; };
        images[key] = img;
    });

    // --- AUDIO API ---
    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    const sounds = {};
    let lastSwing = 0;

    async function loadAudio() {
        if (!audioCtx) initAudio();
        const files = {
            swing1: 'sword_swing 1.wav',
            swing2: 'sword_swing 2.wav'
        };
        for (const [name, url] of Object.entries(files)) {
            try {
                const response = await fetch(url);
                const arrayBuffer = await response.arrayBuffer();
                sounds[name] = await audioCtx.decodeAudioData(arrayBuffer);
            } catch (e) { console.error("Error loading sound:", name); }
        }
    }

    function playSound(type, param) {
        if (!audioCtx) return;
        
        if (type === 'slash') {
            const buffer = Math.random() < 0.5 ? sounds.swing1 : sounds.swing2;
            if (buffer) {
                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                source.connect(gain);
                gain.connect(audioCtx.destination);
                source.start();
            }
            return;
        }

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        
        if (type === 'levelUp') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        } else if (type === 'comboLost') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }
    }

    // --- CONFIGURACIÓN DE BALANCE ---
    const CFG = {
        PLAYER_BASE_SPEED: 280,
        PLAYER_MAX_HP: 100,
        ENEMY_SPEED: 180,
        
        MIN_SLASH_RADIUS: 130,    
        MAX_SLASH_RADIUS: 320,   
        MIN_SLASH_ANGLE: Math.PI / 2.5, 
        MAX_SLASH_ANGLE: Math.PI * 1.2, 
        
        SLASH_COOLDOWN: 0.35,
        COMBO_TIME: 2.5,
        MAX_ENEMIES: 400,
        NEXUS_BASE_COST: 50,
        CHARGE_TIME: 1.0, // Un poco menos para que se sienta mejor
        CHARGE_DELAY: 0.5 // Delay antes de empezar a cargar
    };

    let lastTime = performance.now();
    let mouseDownTimer = 0;
    let mouseDownActive = false;
    let hitstopTimer = 0;
    let spawnTimer = 0;
    let spawnInterval = 0.4; 
    let screenShake = 0; 

    // --- ENTIDADES ---
    const camera = { x: 0, y: 0 };
    
    const player = { 
        x: 0, y: 300, radius: 20, color: '#3498db', 
        hp: CFG.PLAYER_MAX_HP, invulnTimer: 0,
        facingX: 1, facingY: 0, renderFacing: 1, // renderFacing sirve para voltear el sprite
        slashCooldown: 0, isSlashing: false, slashVisualTimer: 0,
        combo: 0, comboTimer: 0, pocketMana: 0,
        lastSlashRadius: CFG.MIN_SLASH_RADIUS,
        lastSlashAngle: CFG.MIN_SLASH_ANGLE,
        isCharging: false, chargeLevel: 0, isSuperSlash: false
    };

    const nexus = { 
        x: 0, y: 0, size: 100, color: '#9b59b6', 
        level: 1, mana: 0, nextCost: CFG.NEXUS_BASE_COST 
    };
    
    let enemies = [];
    let loots = [];
    let floatingTexts = [];
    let keys = {};
    let mouseX = canvas.width / 2;
    let mouseY = canvas.height / 2;

    window.addEventListener('keydown', e => { keys[e.code] = true; });
    window.addEventListener('keyup', e => { keys[e.code] = false; });
    window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
    window.addEventListener('mousedown', e => {
        if (!audioCtx) {
            initAudio();
            loadAudio();
        }
        if (player.slashCooldown <= 0 && player.hp > 0) {
            doSlash(); // Ataque instantáneo
            mouseDownActive = true;
            mouseDownTimer = 0;
            player.chargeLevel = 0;
        }
    });
    window.addEventListener('mouseup', e => {
        if (mouseDownActive) {
            if (player.isCharging && player.chargeLevel >= CFG.CHARGE_TIME) {
                doSlash(); // Release full charge
            }
            player.isCharging = false;
            mouseDownActive = false;
            document.getElementById('charge-bar-container').style.opacity = 0;
        }
    });

    // --- SISTEMAS ---
    function doSlash() {
        let isFullCharge = player.chargeLevel >= CFG.CHARGE_TIME;
        
        // El tajo cargado ignora el cooldown normal
        if (player.slashCooldown > 0 && !isFullCharge) return;

        playSound('slash');

        let dx = mouseX - (canvas.width / 2);
        let dy = mouseY - (canvas.height / 2);
        let length = Math.sqrt(dx*dx + dy*dy);
        if (length > 0) {
            player.facingX = dx / length;
            player.facingY = dy / length;
            if (player.facingX < 0) player.renderFacing = -1;
            else if (player.facingX > 0) player.renderFacing = 1;
        }

        player.slashCooldown = CFG.SLASH_COOLDOWN;
        player.isSlashing = true;
        player.slashVisualTimer = 0.15; 

        player.isSuperSlash = isFullCharge;

        if (isFullCharge) {
            player.lastSlashRadius = 400; // Un poco más grande
            player.lastSlashAngle = Math.PI * 2;
            player.slashVisualTimer = 0.3; 
        } else {
            let comboFactor = Math.min(player.combo / 100, 1.0); 
            // Como es instantáneo, el chargeFactor es 1.0 (o basado en combo)
            player.lastSlashRadius = CFG.MIN_SLASH_RADIUS + (CFG.MAX_SLASH_RADIUS - CFG.MIN_SLASH_RADIUS) * comboFactor;
            player.lastSlashAngle = CFG.MIN_SLASH_ANGLE + (CFG.MAX_SLASH_ANGLE - CFG.MIN_SLASH_ANGLE) * comboFactor;
        }

        let hitCount = 0;

        enemies.forEach(e => {
            let edx = e.x - player.x;
            let edy = e.y - player.y;
            let dist = Math.sqrt(edx*edx + edy*edy);

            // Detección mejorada: radius del enemigo ayuda a ser golpeado
            if (dist <= player.lastSlashRadius + e.radius) {
                let dot = (edx/dist)*player.facingX + (edy/dist)*player.facingY;
                // Si es super slash, ignoramos el ángulo (es 360)
                if (isFullCharge || dot > Math.cos(player.lastSlashAngle/2)) {
                    hitCount++; // CADA GOLPE suma al combo, incluso si no muere
                    
                    if (isFullCharge) {
                        e.hp = 0; // Super slash aniquila todo
                    } else {
                        e.hp -= 1;
                        // Empujón al golpear enemigos grandes
                        if (e.hp > 0) {
                            e.x += (edx/dist) * 40;
                            e.y += (edy/dist) * 40;
                        }
                    }
                    
                    if (e.hp <= 0) {
                        e.dead = true;
                        spawnLoot(e.x, e.y, player.combo);
                    }
                }
            }
        });

        if (hitCount > 0) {
            hitstopTimer = 0.03 + (hitCount * (isFullCharge ? 0.015 : 0.008));
            // Super slash multiplica combo, tajo rápido suma normal
            let comboGain = isFullCharge ? hitCount * 3 : hitCount;
            player.combo += comboGain;
            
            player.comboTimer = CFG.COMBO_TIME;
            screenShake = isFullCharge ? 25 : Math.min(player.combo * 0.5, 15); 
        } else {
            if (!isFullCharge) loseCombo(); 
        }
        
        player.chargeLevel = 0;
    }

    function loseCombo() {
        if (player.combo > 5) playSound('comboLost');
        player.combo = 0;
        player.comboTimer = 0;
        screenShake = 0;
    }

    function spawnEnemy() {
        if (enemies.length >= CFG.MAX_ENEMIES) return;
        let angle = Math.random() * Math.PI * 2;
        let dist = Math.max(canvas.width, canvas.height) / 2 + 200;
        let ex = player.x + Math.cos(angle) * dist;
        let ey = player.y + Math.sin(angle) * dist;
        
        let isBig = Math.random() < 0.15; // 15% de enemigos grandes
        enemies.push({ 
            x: ex, y: ey, 
            radius: isBig ? 35 : 18, 
            color: isBig ? '#c0392b' : '#e74c3c', 
            facing: 1,
            hp: isBig ? 4 : 1,
            speed: isBig ? CFG.ENEMY_SPEED * 0.6 : CFG.ENEMY_SPEED
        });
    }

    function spawnLoot(x, y, combo) {
        let isHuge = combo >= 30;
        let isMedium = combo >= 10;
        loots.push({
            x: x + (Math.random()*20 - 10), y: y + (Math.random()*20 - 10),
            size: isHuge ? 20 : (isMedium ? 12 : 6),
            color: isHuge ? '#f1c40f' : (isMedium ? '#2ecc71' : '#3498db'),
            value: isHuge ? 30 : (isMedium ? 5 : 1),
            life: 6.0
        });
    }

    function spawnFloatingText(x, y, text, color) {
        floatingTexts.push({ x: x, y: y, text: text, color: color, life: 2.0 });
    }

    function upgradePlayer() {
        playSound('levelUp');
        nexus.level++;
        nexus.mana -= nexus.nextCost;
        nexus.nextCost = Math.floor(nexus.nextCost * 1.5); 
        
        const rand = Math.random();
        let upgradeText = "";
        
        if (rand < 0.33) {
            CFG.MAX_SLASH_RADIUS += 15;
            CFG.MIN_SLASH_RADIUS += 5;
            upgradeText = "+ RANGO MÁXIMO";
        } else if (rand < 0.66) {
            CFG.SLASH_COOLDOWN = Math.max(0.15, CFG.SLASH_COOLDOWN - 0.03);
            upgradeText = "+ VELOCIDAD DE ATAQUE";
        } else {
            CFG.PLAYER_BASE_SPEED += 15;
            upgradeText = "+ AGILIDAD BASE";
        }

        spawnInterval = Math.max(0.05, spawnInterval - 0.06); 
        
        spawnFloatingText(nexus.x, nexus.y - 80, "¡NIVEL " + nexus.level + "!", "#9b59b6");
        spawnFloatingText(nexus.x, nexus.y - 50, upgradeText, "#f1c40f");
    }

    // --- GAME LOOP ---
    function update(dt) {
        if (player.hp <= 0) {
            player.isCharging = false;
            document.getElementById('charge-bar-container').style.opacity = 0;
            return;
        }

        if (player.slashCooldown > 0) player.slashCooldown -= dt;
        if (player.slashVisualTimer > 0) player.slashVisualTimer -= dt;
        if (player.invulnTimer > 0) player.invulnTimer -= dt;
        if (screenShake > 0) screenShake -= dt * 60;

        if (mouseDownActive && !player.isCharging) {
            mouseDownTimer += dt;
            if (mouseDownTimer >= CFG.CHARGE_DELAY) {
                player.isCharging = true;
                player.chargeLevel = 0;
                document.getElementById('charge-bar-container').style.opacity = 1;
            }
        }

        if (player.isCharging) {
            player.chargeLevel += dt;
            let chargePerc = Math.min(100, (player.chargeLevel / CFG.CHARGE_TIME) * 100);
            document.getElementById('charge-bar').style.width = chargePerc + '%';
        }
        
        if (player.comboTimer > 0) {
            player.comboTimer -= dt;
            if (player.comboTimer <= 0) loseCombo();
        }

        let vx = 0; let vy = 0;
        if (keys['KeyW']) vy = -1;
        if (keys['KeyS']) vy = 1;
        if (keys['KeyA']) vx = -1;
        if (keys['KeyD']) vx = 1;

        let comboSpeedBonus = Math.min(player.combo * 2, 150);
        let currentSpeed = CFG.PLAYER_BASE_SPEED + comboSpeedBonus;
        if (player.isCharging) currentSpeed *= 0.3; 

        if (vx !== 0 || vy !== 0) {
            let length = Math.sqrt(vx*vx + vy*vy);
            player.x += (vx / length) * currentSpeed * dt;
            player.y += (vy / length) * currentSpeed * dt;
            // Actualizar hacia donde mira gráficamente el jugador mientras camina
            if (vx < 0) player.renderFacing = -1;
            else if (vx > 0) player.renderFacing = 1;
        }

        spawnTimer += dt;
        if (spawnTimer >= spawnInterval) {
            spawnTimer = 0;
            spawnEnemy();
        }

        enemies.forEach(e => {
            let dx = player.x - e.x; let dy = player.y - e.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 0) {
                e.x += (dx / dist) * (e.speed || CFG.ENEMY_SPEED) * dt;
                e.y += (dy / dist) * (e.speed || CFG.ENEMY_SPEED) * dt;
                // Actualizar sprite del enemigo (mirar izquierda o derecha)
                if (dx < 0) e.facing = 1; // El jugador está a la izquierda, el enemigo va a la izquierda
                else e.facing = -1;
            }
            if (dist < player.radius + e.radius && player.invulnTimer <= 0) {
                player.hp -= 15;
                loseCombo();
                player.invulnTimer = 0.5;
                screenShake = 20;
                if (player.hp < 0) player.hp = 0;
                document.getElementById('health-bar').style.width = (player.hp / CFG.PLAYER_MAX_HP * 100) + '%';
                e.x -= (dx / dist) * 100; e.y -= (dy / dist) * 100;
            }
        });
        enemies = enemies.filter(e => !e.dead);

        loots.forEach(l => {
            l.life -= dt;
            let dx = player.x - l.x; let dy = player.y - l.y;
            let magnetRadius = player.radius + 60 + Math.min(player.combo, 100);
            if (Math.sqrt(dx*dx + dy*dy) < magnetRadius) {
                player.pocketMana += l.value;
                l.collected = true;
            }
        });
        loots = loots.filter(l => !l.collected && l.life > 0);

        let mdx = player.x - nexus.x; let mdy = player.y - nexus.y;
        if (Math.sqrt(mdx*mdx + mdy*mdy) < nexus.size/2 + player.radius) {
            if (player.pocketMana > 0) {
                let transfer = Math.min(player.pocketMana, 5 + (player.pocketMana*0.1)); 
                nexus.mana += transfer;
                player.pocketMana -= transfer;
                
                if (player.hp < CFG.PLAYER_MAX_HP) {
                    player.hp = Math.min(CFG.PLAYER_MAX_HP, player.hp + 0.2);
                    document.getElementById('health-bar').style.width = (player.hp / CFG.PLAYER_MAX_HP * 100) + '%';
                }

                if (nexus.mana >= nexus.nextCost) {
                    upgradePlayer();
                }
            }
        }

        floatingTexts.forEach(ft => {
            ft.life -= dt;
            ft.y -= 30 * dt; 
        });
        floatingTexts = floatingTexts.filter(ft => ft.life > 0);

        camera.x += (player.x - camera.x) * 8 * dt;
        camera.y += (player.y - camera.y) * 8 * dt;

        document.getElementById('pocket-score').innerText = Math.floor(player.pocketMana);
        document.getElementById('nexus-level').innerText = nexus.level;
        
        let comboUI = document.getElementById('combo-display');
        let comboTimerUI = document.getElementById('combo-timer-text');
        let comboCountUI = document.getElementById('combo-count');

        if (player.combo > 1) {
            comboCountUI.innerText = player.combo;
            comboUI.style.opacity = 1;
            let scale = 1 + Math.min(player.combo * 0.02, 1.0);
            comboUI.style.transform = `scale(${scale})`;
            
            if (player.comboTimer < 1.0) {
                comboUI.classList.add('danger');
                comboTimerUI.style.opacity = 1;
            } else {
                comboUI.classList.remove('danger');
                comboTimerUI.style.opacity = 0;
            }
        } else {
            comboUI.style.opacity = 0;
            comboUI.classList.remove('danger');
            comboTimerUI.style.opacity = 0;
        }
    }

    // --- FUNCIÓN HELPER PARA DIBUJAR SPRITES VOLTEADOS ---
    function drawSprite(img, x, y, size, facingX) {
        ctx.save();
        ctx.translate(x, y);
        if (facingX < 0) {
            ctx.scale(-1, 1); // Voltear horizontalmente
        }
        
        const aspect = img.naturalWidth / img.naturalHeight;
        let drawW = size * 2;
        let drawH = size * 2;
        
        if (aspect > 1) {
            drawH = drawW / aspect;
        } else {
            drawW = drawH * aspect;
        }
        
        ctx.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        
        let shakeX = (Math.random() - 0.5) * screenShake;
        let shakeY = (Math.random() - 0.5) * screenShake;
        ctx.translate((canvas.width / 2 - camera.x) + shakeX, (canvas.height / 2 - camera.y) + shakeY);

        // Suelo Infinito
        ctx.strokeStyle = '#22222a';
        ctx.lineWidth = 2;
        let gridSize = 100;
        let startX = Math.floor((camera.x - canvas.width/2) / gridSize) * gridSize;
        let startY = Math.floor((camera.y - canvas.height/2) / gridSize) * gridSize;
        ctx.beginPath();
        for (let x = startX - gridSize; x < camera.x + canvas.width/2 + gridSize; x += gridSize) {
            ctx.moveTo(x, camera.y - canvas.height/2 - 100); ctx.lineTo(x, camera.y + canvas.height/2 + 100);
        }
        for (let y = startY - gridSize; y < camera.y + canvas.height/2 + gridSize; y += gridSize) {
            ctx.moveTo(camera.x - canvas.width/2 - 100, y); ctx.lineTo(camera.x + canvas.width/2 + 100, y);
        }
        ctx.stroke();

        // -------------------------
        // DIBUJAR NEXO (MAGO)
        // -------------------------
        if (images.nexus.isLoaded && images.nexus.naturalWidth > 0) {
            ctx.drawImage(images.nexus, nexus.x - nexus.size/2, nexus.y - nexus.size/2, nexus.size, nexus.size);
        } else {
            ctx.fillStyle = nexus.color;
            ctx.fillRect(nexus.x - nexus.size/2, nexus.y - nexus.size/2, nexus.size, nexus.size);
            ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = 'bold 18px monospace';
            ctx.fillText("NEXO", nexus.x, nexus.y - 10);
        }
        
        // Barra de progreso del Nexo
        let progress = nexus.mana / nexus.nextCost;
        ctx.fillStyle = '#111';
        ctx.fillRect(nexus.x - nexus.size/2, nexus.y + nexus.size/2 + 10, nexus.size, 10);
        ctx.fillStyle = '#3498db';
        ctx.fillRect(nexus.x - nexus.size/2, nexus.y + nexus.size/2 + 10, nexus.size * progress, 10);
        ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = '12px monospace';
        ctx.fillText(Math.floor(nexus.mana) + "/" + nexus.nextCost, nexus.x, nexus.y + nexus.size/2 + 35);

        // -------------------------
        // DIBUJAR LOOT
        // -------------------------
        loots.forEach(l => {
            ctx.fillStyle = l.color;
            ctx.globalAlpha = l.life < 1.0 ? l.life : 1.0;
            ctx.save();
            ctx.translate(l.x, l.y);
            ctx.rotate(Math.PI / 4);
            ctx.fillRect(-l.size/2, -l.size/2, l.size, l.size);
            ctx.restore();
        });
        ctx.globalAlpha = 1.0;

        // -------------------------
        // DIBUJAR ENEMIGOS
        // -------------------------
        enemies.forEach(e => {
            if (images.enemy.isLoaded && images.enemy.naturalWidth > 0) {
                drawSprite(images.enemy, e.x, e.y, e.radius * 4, e.facing);
            } else {
                ctx.fillStyle = e.color;
                ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2); ctx.fill();
            }
        });

        // Trazado del combo en el suelo (Círculo de drenaje)
        if (player.combo > 0 && player.hp > 0) {
            ctx.strokeStyle = player.comboTimer < 1.0 ? '#e74c3c' : '#f1c40f';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius + 15, -Math.PI/2, (-Math.PI/2) + (Math.PI * 2 * (player.comboTimer / CFG.COMBO_TIME)));
            ctx.stroke();
        }

        // -------------------------
        // DIBUJAR JUGADOR (CABALLERO)
        // -------------------------
        if (player.invulnTimer > 0 && Math.floor(player.invulnTimer * 20) % 2 === 0) {
            ctx.globalAlpha = 0.3; // Parpadeo de daño
        }
        
        if (images.player.isLoaded && images.player.naturalWidth > 0) {
            drawSprite(images.player, player.x, player.y, player.radius * 3, player.renderFacing);
        } else {
            ctx.fillStyle = player.color;
            ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1.0;

        // Flecha indicadora al Nexo
        let nDx = nexus.x - player.x;
        let nDy = nexus.y - player.y;
        let nDist = Math.sqrt(nDx*nDx + nDy*nDy);
        if (nDist > 150) { 
            let angle = Math.atan2(nDy, nDx);
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(angle);
            ctx.fillStyle = 'rgba(155, 89, 182, 0.8)'; 
            ctx.beginPath();
            ctx.moveTo(60, 0); ctx.lineTo(45, -8); ctx.lineTo(45, 8); ctx.closePath();
            ctx.fill();
            ctx.restore();
        }
        
        // Puntero de apuntado
        let dx = mouseX - (canvas.width / 2); let dy = mouseY - (canvas.height / 2);
        let length = Math.sqrt(dx*dx + dy*dy);
        if (length > 0 && player.hp > 0) {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(player.x, player.y);
            ctx.lineTo(player.x + (dx/length) * 40, player.y + (dy/length) * 40); ctx.stroke();
        }

        // Animación Slash (Cónica Dinámica / Circular)
        if (player.slashVisualTimer > 0) {
            let baseAngle = Math.atan2(player.facingY, player.facingX);
            let totalVisualTime = player.isSuperSlash ? 0.3 : 0.15;
            let slashAlpha = player.slashVisualTimer / totalVisualTime;
            
            if (player.isSuperSlash) {
                ctx.fillStyle = `rgba(46, 204, 113, ${slashAlpha})`; 
            } else {
                ctx.fillStyle = player.combo >= 20 ? `rgba(241, 196, 15, ${slashAlpha})` : `rgba(255, 255, 255, ${slashAlpha})`;
            }

            ctx.beginPath(); 
            ctx.moveTo(player.x, player.y);
            if (player.isSuperSlash) {
                ctx.arc(player.x, player.y, player.lastSlashRadius, 0, Math.PI*2);
            } else {
                ctx.arc(player.x, player.y, player.lastSlashRadius, baseAngle - player.lastSlashAngle/2, baseAngle + player.lastSlashAngle/2);
            }
            ctx.closePath(); 
            ctx.fill();
            
            // Borde del tajo
            ctx.strokeStyle = player.isSuperSlash ? `rgba(255, 255, 255, ${slashAlpha})` : `rgba(255, 255, 255, ${slashAlpha*0.5})`;
            ctx.lineWidth = player.isSuperSlash ? 4 : 2;
            ctx.stroke();
        }

        // Indicador de Carga (Aura)
        if (player.isCharging) {
            let chargeRatio = Math.min(1.0, player.chargeLevel / CFG.CHARGE_TIME);
            ctx.strokeStyle = chargeRatio >= 1.0 ? '#2ecc71' : '#f1c40f';
            ctx.lineWidth = 2 + chargeRatio * 4;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius + 10 + Math.sin(Date.now()*0.01)*5, 0, Math.PI*2);
            ctx.stroke();
        }

        // Textos Flotantes
        floatingTexts.forEach(ft => {
            ctx.fillStyle = ft.color;
            ctx.globalAlpha = ft.life < 1.0 ? ft.life : 1.0;
            ctx.font = 'bold 20px monospace';
            ctx.fillText(ft.text, ft.x, ft.y);
            ctx.globalAlpha = 1.0;
        });

        ctx.restore();

        // Tutorial en Pantalla
        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
        ctx.font = '18px monospace';
        ctx.textAlign = 'center';
        ctx.fillText("Click para atacar | Mantén click para ataque cargado", canvas.width/2, canvas.height - 110);

        if (player.hp <= 0) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#e74c3c'; ctx.textAlign = 'center'; ctx.font = 'bold 48px monospace';
            ctx.fillText("HAS MUERTO", canvas.width/2, canvas.height/2);
        }
    }

    function loop(timestamp) {
        let dt = (timestamp - lastTime) / 1000;
        lastTime = timestamp;
        if (dt > 0.1) dt = 0.1; 

        if (hitstopTimer > 0) hitstopTimer -= dt;
        else update(dt);
        
        draw();
        requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
</script>
</body>
</html>
